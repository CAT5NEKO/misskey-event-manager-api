services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://misched:${DB_PASSWORD}@postgres:5432/miSchedule?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ALLOWED_INSTANCES: ${ALLOWED_INSTANCES}
      NOTIFY_EVENT_URL: ${NOTIFY_EVENT_URL}
      NOTIFICATION_INTERVAL: "60"
      LOG_LEVEL: info
      TZ: Asia/Tokyo
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: miSchedule
      POSTGRES_USER: misched
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Tokyo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U misched -d miSchedule"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
