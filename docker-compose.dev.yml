services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - dev-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: miSchedule_dev
      POSTGRES_USER: misched
      POSTGRES_PASSWORD: devpassword
      TZ: Asia/Tokyo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U misched -d miSchedule_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://misched:devpassword@postgres:5432/miSchedule_dev?sslmode=disable
      JWT_SECRET: dev-secret-do-not-use-in-prod
      JWT_REFRESH_SECRET: dev-refresh-secret-do-not-use-in-prod
      ENCRYPTION_KEY: dev-32byte-key-00000000000000
      ALLOWED_ORIGINS: http://localhost:5173
      ALLOWED_INSTANCES: localhost:3000
      HOST_RESOLVE_MAP: http://localhost:3000=http://host.docker.internal:3000
      NOTIFY_EVENT_URL: "http://localhost:5173"
      NOTIFICATION_INTERVAL: "60"
      LOG_LEVEL: debug
      PORT: "8080"
      TZ: Asia/Tokyo
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dev-pgdata:
